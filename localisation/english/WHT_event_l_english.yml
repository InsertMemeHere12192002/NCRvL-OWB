l_english:
  nf_whitelegs.1.t:0 "The White Legs Path"
  nf_whitelegs.1.d:0 "The White Legs are a nomadic tribe of raiders and slavers. They are known for their brutality and their distinctive white face paint. They are known to be ..."
  nf_whitelegs.1.a:0 "...Strong and ruthless warriors."
  nf_whitelegs.1.b:0 "... Cunning and resourceful raiders."

  nf_whitelegs.2.t:0 "The White Legs encounter Super Mutants"
  nf_whitelegs.2.d:0 "The White Legs have been raiding caravans and settlements in the area, but they have recently come into conflict with a group of Super Mutants. The Super Mutants are a powerful and aggressive species that have been known to attack and kill humans. The White Legs are now faced with the decision of whether to continue their raids and risk confrontation with the Super Mutants, or to try to find a way to coexist with them."
  nf_whitelegs.2.a:0 "We should try to find a way to recruit the Super Mutants."
  nf_whitelegs.2.b:0 "We should defeat them and enslave them."

  nf_whitelegs.3.t:0 "The White Legs Found Old Factory"
  nf_whitelegs.3.d:0 "The White Legs have found an old factory that they can use as a base of operations. The factory is in a state of disrepair, but it has the potential to be a valuable asset for the White Legs. They will need to repair and fortify the factory in order to make it a safe and secure place for their operations."
  nf_whitelegs.3.a:0 "We should use the factory as a base for our raids and attacks."
  nf_whitelegs.3.b:0 "We should repair the factory and use it as a safe haven for our people."